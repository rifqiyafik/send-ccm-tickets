name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check index.js

      - name: Run tests
        run: npm test

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER}/send-ccm-ticket"
          echo "image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'

    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_PORT: ${{ secrets.VM_PORT }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
      DEPLOY_IMAGE: ${{ needs.docker.outputs.image }}

    steps:
      - name: Skip deploy when VM secrets are not configured
        if: env.VM_HOST == '' || env.VM_USER == '' || env.VM_SSH_KEY == ''
        run: |
          echo "VM deploy skipped."
          echo "Set VM_HOST, VM_USER, and VM_SSH_KEY repository secrets to enable CD."

      - name: Deploy image to VM
        if: env.VM_HOST != '' && env.VM_USER != '' && env.VM_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ env.VM_SSH_KEY }}
          port: ${{ env.VM_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_IMAGE,VM_APP_DIR
          script: |
            set -e
            APP_DIR="${VM_APP_DIR:-/opt/send-ccm-ticket}"
            cd "$APP_DIR"
            if [ ! -f .env ]; then
              echo ".env not found in $APP_DIR"
              exit 1
            fi
            if ! grep -q '^APP_IMAGE=' .env; then
              printf '\nAPP_IMAGE=%s\n' "$DEPLOY_IMAGE" >> .env
            else
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=$DEPLOY_IMAGE|" .env
            fi
            docker compose pull
            docker compose up -d
            docker compose ps
