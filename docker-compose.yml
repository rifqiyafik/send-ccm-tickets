services:
  ccm-ticket-bot:
    image: ${APP_IMAGE:-send-ccm-ticket:latest}
    container_name: send-ccm-ticket
    restart: unless-stopped
    init: true
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Asia/Jakarta
    volumes:
      - ./config:/app/config
      - ./sessions:/app/sessions
      - ./data/runtime:/app/data/runtime
      - ./downloads:/app/downloads
      - ./logs:/app/logs
