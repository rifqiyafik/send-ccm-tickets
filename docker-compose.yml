services:
  ccm-ticket-bot:
    image: ${APP_IMAGE:-send-ccm-ticket:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: send-ccm-ticket
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Asia/Jakarta
    volumes:
      - ./config:/app/config
      - ./sessions:/app/sessions
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
